# Cloudflare Email Worker for opencode-webhooks.
#
# Receives inbound mail via Cloudflare Email Routing, filters the From
# address against ALLOWED_SENDERS, HMAC-signs the raw RFC822 body, and
# POSTs it to the opencode-webhooks plugin's /webhooks/email endpoint.
#
# Set up checklist (see README.md for the long version):
#   1. Cloudflare dashboard → Email → enable Email Routing on your zone.
#   2. Add a destination address (e.g. gh@yourdomain.com) and verify it.
#   3. Edit ALLOWED_SENDERS + SIDECAR_URL below to your values.
#   4. wrangler secret put EMAIL_WEBHOOK_SECRET   (paste a random hex string;
#      put the same value in the plugin's EMAIL_WEBHOOK_SECRET env var)
#   5. bun run deploy
#   6. Cloudflare → Email Routing → Catch-all (or specific rule) →
#      "Send to a Worker" → choose opencode-email-worker.

name = "opencode-email-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
# Public, non-sensitive config. Edit and redeploy to change.
#
# JSON-encoded array of sender patterns. Strings starting and ending with
# "/" are treated as case-insensitive regex (slashes are delimiters);
# everything else is exact-match (case-insensitive) against the bare
# address parsed out of an RFC5322 From header.
ALLOWED_SENDERS = '["notifications@github.com", "/^.*@github\\.com$/"]'

# Public URL of the opencode-webhooks plugin's email endpoint. Must be
# reachable from Cloudflare's worker network (so a public ingress, not
# private-only). Replace with your actual URL.
SIDECAR_URL = "https://your-opencode-host.example.com:5050/webhooks/email"

# Secrets (set via `wrangler secret put`):
#   EMAIL_WEBHOOK_SECRET   — HMAC sha256 secret shared with the plugin
